- name: Deploy Java App Container
  hosts: webserver
  become: false

  tasks:
    - name: Install Docker
      docker_image:
        name: docker
        source: build
        build:
          path: ~/project/
        state: present
        vars:
          ansible_python_interpreter: /bin/python3

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Pull Docker Image
      command: docker pull subbu2712/java-app-ansible:latest

    - name: Stop existing container
      command: docker stop java-app-ansible
      ignore_errors: yes

    - name: Remove existing container
      command: docker rm java-app-ansible
      ignore_errors: yes

    - name: Run new container
      command: >
        docker run -d --name java-app-ansible
        -p 8080:8080
        subbu2712/java-app-ansible:latest
