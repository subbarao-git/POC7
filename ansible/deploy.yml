---
- name: Deploy Java App Container
  hosts: webserver
  become: yes

  tasks:
    - name: Install Docker
      yum:
        name: docker
        state: present
      when: ansible_os_family == "RedHat"

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Pull Docker Image
      command: docker pull subbu2712/java-app-ansible1:latest

    - name: Stop existing container
      command: docker stop java-app-ansible1
      ignore_errors: yes

    - name: Remove existing container
      command: docker rm java-app-ansible1
      ignore_errors: yes

    - name: Run new container
      command: >
        docker run -d --name java-app-ansible1
        -p 8080:8080
        subbu2712/java-app-ansible1:latest
